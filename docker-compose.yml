services:

  mlflow:
    image: python:3.14.0-slim
    container_name: mlflow-server
    command: >
      bash -c "pip install mlflow &&
               mlflow server
               --host 0.0.0.0
               --port 5000
               --backend-store-uri sqlite:///mlflow.db
               --default-artifact-root /mlflow/artifacts"
    ports:
      - "5000:5000"
    volumes:
      - mlflow_data:/mlflow
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5000"]
      interval: 10s
      retries: 5

  trainer:
    build: .
    container_name: model-trainer
    env_file: .env
    volumes:
      - ./data:/app/data
      - ./models:/app/models
    depends_on:
      mlflow:
        condition: service_healthy

volumes:
  mlflow_data: